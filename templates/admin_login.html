<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Admin — Nexacart</title>
<link rel="icon" href="/static/favicon.ico">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#1a2332;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:system-ui,sans-serif}
.card{background:#fff;border-radius:12px;padding:2.5rem 2rem;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.4)}
h1{font-size:1.4rem;font-weight:700;margin-bottom:.3rem;color:#1a2332}
.sub{font-size:.82rem;color:#6b7280;margin-bottom:1.8rem}
label{display:block;font-size:.72rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#6b7280;margin-bottom:.4rem}
input{width:100%;background:#f9fafb;border:1.5px solid #e5e7eb;border-radius:6px;padding:.75rem 1rem;font-size:.9rem;outline:none;margin-bottom:1.2rem;transition:border-color .2s}
input:focus{border-color:#2d5016;box-shadow:0 0 0 3px rgba(45,80,22,.1)}
.err{background:#fef2f2;border-left:3px solid #ef4444;border-radius:4px;color:#dc2626;font-size:.82rem;padding:.65rem .9rem;margin-bottom:1.2rem}
button{width:100%;background:#2d5016;color:#fff;border:none;border-radius:6px;padding:.85rem;font-size:.85rem;font-weight:600;cursor:pointer;transition:background .2s}
button:hover{background:#4a7c2b}
.badge{display:inline-block;background:#2d5016;color:#fff;font-size:.65rem;font-weight:700;letter-spacing:.12em;padding:.2rem .6rem;border-radius:4px;margin-bottom:1.2rem}
</style></head><body>
<div class="card">
  <div class="badge">ADMIN ACCESS</div>
  <h1>Nexacart Admin</h1>
  <p class="sub">Enter the admin password to continue.</p>
  {% if error %}<div class="err">{{ error }}</div>{% endif %}
  <form method="post">
    <label>Admin Password</label>
    <input type="password" name="secret" placeholder="••••••••" required autofocus>
    <button type="submit">Enter Dashboard</button>
  </form>
</div>
</body></html>
