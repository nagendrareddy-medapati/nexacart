{% extends "base.html" %}
{% block title %}{{ page_title }} — Nexacart{% endblock %}
{% block navbar %}
<nav class="navbar">
  <div class="nav-brand">
        <svg class="nav-brand-logo" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="16" cy="16" r="16" fill="rgba(255,255,255,0.15)"/>
          <path d="M9 15h14l-1.5 9H10.5L9 15z" fill="rgba(255,255,255,0.25)" stroke="rgba(255,255,255,0.9)" stroke-width="1.2" stroke-linejoin="round"/>
          <path d="M12 15v-3a4 4 0 0 1 8 0v3" stroke="rgba(255,255,255,0.9)" stroke-width="1.3" stroke-linecap="round" fill="none"/>
          <circle cx="16" cy="20" r="3.5" fill="#b8882a"/>
          <text x="16" y="23" text-anchor="middle" font-family="Georgia,serif" font-size="5" font-weight="700" fill="#fff">N</text>
        </svg>
        Nexacart
      </div>
  <div class="nav-right">
    <a href="{{ url_for('home') }}" class="nav-back">🏠 Home</a>
    <a href="{{ url_for('cart') }}" class="nav-cart">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
      Cart {% if cart_count > 0 %}<span class="cart-pill">{{ cart_count }}</span>{% endif %}
    </a>
    <a href="{{ url_for('logout') }}" class="nav-out">Sign out</a>
  </div>
</nav>
{% endblock %}
{% block content %}
<div class="inner-page">
  <div class="inner-page-header">
    <h1 class="inner-page-title">{{ page_title }}</h1>
  </div>
  <div class="static-content">{{ content|safe }}</div>
</div>
{% endblock %}
